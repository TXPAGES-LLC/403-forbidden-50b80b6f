name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-a403forbidden
  cancel-in-progress: true

env:
  REGISTRY_NAME: websitesRegistry
  IMAGE_NAME: a403forbidden

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional --legacy-peer-deps

      - name: Azure CLI Login (parsing credentials)
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          echo "$AZURE_CREDENTIALS" > /tmp/azcreds.json
          # Try to detect cloud name from the credentials JSON (cloudName or cloud)
          CLOUD=$(jq -r '.cloudName // .cloud // empty' /tmp/azcreds.json)
          if [ -n "$CLOUD" ]; then
            case "${CLOUD,,}" in
              azureusgovernment|usgovernment|azuregov|azureusgov)
                CLOUDNAME="AzureUSGovernment" ;;
              azurechinacloud|china)
                CLOUDNAME="AzureChinaCloud" ;;
              azuregermanucloud|germany|azuregermanc|azuregermacloud)
                CLOUDNAME="AzureGermanCloud" ;;
              *)
                CLOUDNAME="AzureCloud" ;;
            esac
            echo "Setting cloud: $CLOUDNAME"
            az cloud set -n "$CLOUDNAME"
          fi
          CLIENT_ID=$(jq -r .clientId /tmp/azcreds.json)
          CLIENT_SECRET=$(jq -r .clientSecret /tmp/azcreds.json)
          TENANT_ID=$(jq -r .tenantId /tmp/azcreds.json)
          SUBSCRIPTION_ID=$(jq -r .subscriptionId /tmp/azcreds.json)

          # Login with service principal and allow no subscriptions to avoid failing when the subscription
          # in the credentials isn't available in the current cloud. We still attempt to set the subscription
          # if provided but don't fail the job on account set.
          az login --service-principal -u "$CLIENT_ID" -p "$CLIENT_SECRET" --tenant "$TENANT_ID" --allow-no-subscriptions
          if [ -n "$SUBSCRIPTION_ID" ] && [ "$SUBSCRIPTION_ID" != "null" ]; then
            az account set -s "$SUBSCRIPTION_ID" || true
          fi

      - name: Resolve ACR login server
        run: |
          LOGIN_SERVER=$(az acr show --name ${{ env.REGISTRY_NAME }} --query loginServer -o tsv)
          echo "LOGIN_SERVER=$LOGIN_SERVER" >> $GITHUB_ENV

      - name: Log in to ACR
        run: az acr login --name ${{ env.REGISTRY_NAME }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}
          file: ${{ github.workspace }}/Dockerfile
          push: true
          tags: |
            ${{ env.LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Container App
        run: |
          ACR_USERNAME=$(az acr credential show --name ${{ env.REGISTRY_NAME }} --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name ${{ env.REGISTRY_NAME }} --query 'passwords[0].value' -o tsv)
          az containerapp up             --name a403forbidden             --resource-group Websites             --environment websites-prod             --image ${{ env.LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}             --registry-server ${{ env.LOGIN_SERVER }}             --registry-username $ACR_USERNAME             --registry-password $ACR_PASSWORD             --target-port 3000             --ingress external